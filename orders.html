<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PicturePlush Bestellungen</title>
<style>:root{--line:#ddd9cf;--soft:#fbfaf7;--text:#171717;--muted:#666}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(180deg,#faf8f2 0%,#f1eee6 100%)}.wrap{max-width:1280px;margin:0 auto;padding:20px}header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}.brand{font-weight:700;font-size:24px}.brand span{color:#7d7d7d}.pill,a.pill{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--soft);font-size:13px;color:inherit;text-decoration:none}.toolbar,.actions{display:flex;gap:10px;flex-wrap:wrap}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,.04)}.pad{padding:22px}h1{font-size:34px;margin:0 0 10px}.lead{margin:0 0 18px;color:#444;line-height:1.5}button{font-size:15px;padding:11px 14px;border-radius:14px;border:1px solid var(--line);background:white;cursor:pointer}.primary{background:#111;color:#fff}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}.preview{display:flex;align-items:center;justify-content:center;padding:14px;border-bottom:1px solid var(--line);min-height:280px}.preview img{max-width:100%;max-height:260px;border-radius:12px}.content{padding:16px}.title{font-size:18px;font-weight:700;margin-bottom:10px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px}.meta div{padding:8px 10px;background:var(--soft);border-radius:12px}.empty{padding:30px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);text-align:center;background:rgba(255,255,255,.6)}.small{font-size:13px;color:var(--muted)}@media (max-width:760px){.wrap{padding:14px}.grid{grid-template-columns:1fr}h1{font-size:28px}.meta{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><header><div class="brand">Picture<span>Plush</span></div><div class="toolbar"><a class="pill" href="index.html">Zum Konfigurator</a><div class="pill" id="countPill">0 Bestellungen</div></div></header>
<section class="panel"><div class="pad"><h1>Bestellübersicht</h1><p class="lead">Hier findest du alle gespeicherten Vorschauen und Bestellungen übersichtlich an einem Ort.</p><div class="actions"><button id="refreshBtn">Aktualisieren</button><button id="exportBtn">JSON exportieren</button><button id="clearBtn" class="primary">Alle löschen</button></div><div id="ordersRoot"></div></div></section></div>
<script>
const ordersRoot=document.getElementById('ordersRoot'),countPill=document.getElementById('countPill'),refreshBtn=document.getElementById('refreshBtn'),exportBtn=document.getElementById('exportBtn'),clearBtn=document.getElementById('clearBtn');
function readOrders(){try{return JSON.parse(localStorage.getItem('pictureplush_orders')||'[]');}catch(e){console.error(e);return[];}}
function renderOrders(){const orders=readOrders();countPill.textContent=`${orders.length} Bestellungen`;if(!orders.length){ordersRoot.innerHTML='<div class="empty">Noch keine gespeicherten Bestellungen vorhanden.</div>';return;}ordersRoot.innerHTML='<div class="grid">'+orders.map(order=>`<article class="card"><div class="preview">${order.previewDataUrl?`<img src="${order.previewDataUrl}" alt="Bestellvorschau">`:'<div class="small">Keine Vorschau gespeichert</div>'}</div><div class="content"><div class="title">${order.type} · ${order.size}</div><div class="meta"><div><strong>Stoff:</strong><br>${order.fabric}</div><div><strong>Aufhängung:</strong><br>${order.hanger}</div><div><strong>Menge:</strong><br>${order.quantity}</div><div><strong>Rand:</strong><br>${order.border}</div><div><strong>Einzelpreis:</strong><br>${order.unitPrice} €</div><div><strong>Produktpreis:</strong><br>${order.price} €</div><div><strong>Versand:</strong><br>${order.shipping} €</div><div><strong>Gesamt:</strong><br>${order.total} €</div></div><div class="small" style="margin-top:10px">Gespeichert: ${new Date(order.createdAt).toLocaleString('de-DE')}</div></div></article>`).join('')+'</div>';}
refreshBtn.addEventListener('click',renderOrders);
exportBtn.addEventListener('click',()=>{const orders=readOrders();const blob=new Blob([JSON.stringify(orders,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pictureplush_orders.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);});
clearBtn.addEventListener('click',()=>{if(!confirm('Wirklich alle gespeicherten Einträge löschen?'))return;localStorage.removeItem('pictureplush_orders');renderOrders();});
renderOrders();
</script></body></html>
